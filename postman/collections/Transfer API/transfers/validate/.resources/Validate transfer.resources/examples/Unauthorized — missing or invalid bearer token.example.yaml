$kind: http-example
request:
  url: "{{baseUrl}}/transfers/validate"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "sourceAccountId": "AC12345678901234",
        "beneficiaryId": "BEN123456789",
        "amount": 1500,
        "currency": "string",
        "type": "rtp",
        "memo": "string",
        "scheduledDate": "2011-11-06"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "error": "<string>",
        "message": "string",
        "details": [
          {
            "field": "<string>",
            "message": "<string>"
          },
          {
            "field": "<string>",
            "message": "<string>"
          }
        ]
      }
order: 2000
