$kind: http-example
request:
  url: "{{baseUrl}}/transfers/:transferId/cancel"
  method: POST
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: transferId
      value: string
      description: The unique identifier of the transfer
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "transferId": "TRF789012345",
        "status": "completed",
        "cancelledAt": "<dateTime>",
        "message": "<string>"
      }
order: 1000
