$kind: http-example
request:
  url: "{{baseUrl}}/transfers/fees"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "amount": "<double>",
        "type": "rtp",
        "currency": "<string>"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "error": "<string>",
        "message": "<string>",
        "details": [
          {
            "field": "<string>",
            "message": "<string>"
          },
          {
            "field": "<string>",
            "message": "<string>"
          }
        ]
      }
order: 4000
