$kind: http-example
request:
  url: "{{baseUrl}}/transfers/fees"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "amount": 3347.999365741228,
        "type": "ach",
        "currency": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "amount": "<double>",
        "currency": "<string>",
        "type": "rtp",
        "fee": "<double>",
        "estimatedDelivery": "1958-02-04"
      }
order: 1000
