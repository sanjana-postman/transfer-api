$kind: http-example
request:
  url: "{{baseUrl}}/transfers/rails-quote"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
          "amount": 500.00, 
          "currency": "USD", 
          "beneficiaryId": "BEN-ACH-00234"
      }
