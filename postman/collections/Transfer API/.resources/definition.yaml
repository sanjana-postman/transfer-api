$kind: collection
description: >-
  The Transfers API enables initiation and management of fund transfers
  including

  ACH, wire transfers, and real-time payments.


  ## Features


  - Initiate domestic and international transfers

  - Support for ACH, Wire, and RTP

  - Transfer scheduling

  - Transfer status tracking and cancellation


  ## Transfer Types


  - **ACH**: Standard domestic transfers (1-3 business days)

  - **Wire**: Same-day domestic and international transfers

  - **RTP**: Real-time payments (instant, domestic only)


