name: Automated API tests and Lint using Postman CLI 

on: push

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
      - name: Lint the spec
        run: |
          postman spec lint "fa5e3177-a6bf-4af1-888a-a8e6c53c4326" --report-events 
      - name: Run API tests
        run: |
          postman collection run "52921466-31ec18c1-369d-4209-84ca-17915ebc5bbb" -e "52921466-a315960b-a042-40ad-8b3b-c623819330e0" --report-events 
      
    